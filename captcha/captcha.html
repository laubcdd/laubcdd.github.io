<script>

    document.write(randNum) ;

    if (randNum == 2)
    setTimeout(function(){

    if (randNum == 3)
    setTimeout(function(){
    window.location.href="https://laubcdd.github.io/captcha/captcha3.html";
    },500);
    
</script>
